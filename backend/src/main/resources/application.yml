server:
  port: 8080
  error:
    include-message: always

cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  exposed-headers: "*"

aws:
  region: ${AWS_REGION:eu-west-1}
  s3:
    mock: true
    buckets:
      customer: speech-practice-app-customer
      sessions: ${S3_BUCKET:speech-practice-app}

huggingface:
  token: ${HF_TOKEN:placeholder}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"

spring:
  kafka:
    bootstrap-servers: ${MSK_BOOTSTRAP:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      group-id: speech-app
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  # spring.ai.openai config added in Phase 4 alongside spring-ai-starter-openai
  datasource:
    url: jdbc:postgresql://localhost:5332/customer
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  main:
    web-application-type: servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  codec:
    max-in-memory-size: 10MB