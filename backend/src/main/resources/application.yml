server:
  port: 8080
  error:
    include-message: always

cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  exposed-headers: "*"

aws:
  region: ${AWS_REGION:eu-west-1}
  s3:
    mock: true
    buckets:
      customer: speech-practice-app-customer
      sessions: ${S3_BUCKET:speech-practice-app}

huggingface:
  token: ${HF_TOKEN:placeholder}
  whisper:
    url: ${WHISPER_URL:https://api-inference.huggingface.co/models/openai/whisper-large-v3}
    max-attempts: 3
    retry-delay: PT5S

llm:
  timeout: PT15S
  groq:
    url: ${GROQ_URL:https://api.groq.com/openai/v1/chat/completions}
    token: ${GROQ_API_KEY:placeholder}
    model: mixtral-8x7b-32768
  hf:
    url: ${HF_MISTRAL_URL:https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2}
  prompt:
    template: |
      You are a public speaking coach. Analyze the following transcript and
      return ONLY a valid JSON object with this exact shape, no prose:
      {"scores": {"clarity": <0-100>, "structure": <0-100>, "delivery": <0-100>},
       "bullets": [{"type": "positive|warning|tip", "text": "..."}]}

      Existing analysis: {{scores}}

      Transcript:
      {{transcript}}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"

spring:
  kafka:
    bootstrap-servers: ${MSK_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      group-id: speech-app
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.kaiyuewei.*"
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  # spring.ai.openai config added in Phase 4 alongside spring-ai-starter-openai
  datasource:
    url: jdbc:postgresql://localhost:5332/customer
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  main:
    web-application-type: servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  codec:
    max-in-memory-size: 10MB